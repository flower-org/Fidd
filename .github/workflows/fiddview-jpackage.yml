name: FiddView JPackage

on:
  workflow_dispatch:

jobs:
  build-fiddview-image:
    name: Build FiddView on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: FiddView-jpackage-linux
            artifact_path: FiddView/build/jpackage/FiddView
          - os: windows-latest
            artifact_name: FiddView-jpackage-windows
            artifact_path: FiddView/build/jpackage/FiddView
          - os: macos-latest
            artifact_name: FiddView-jpackage-macos
            artifact_path: FiddView/build/jpackage/FiddView.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      - name: Build FiddView app image
        run: gradle :FiddView:jpackageImage

      - name: Upload FiddView app image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
