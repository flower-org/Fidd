name: Release Cryptor

# This triggers workflow on tag push
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Allow write access to repository contents

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          submodules: true

      - name: Set up JDK 17 with Temurin
        uses: actions/setup-java@v2
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.5

      - name: Do wrapper
        run: gradle wrapper

      - name: Build JAR file with Gradle
        run: ./gradlew shadowJar

      - name: ls-cryptor
        run: ls -al Cryptor/build/libs

      - name: sha256-cryptor
        run: openssl sha256 Cryptor/build/libs/*

      - name: ls-fiddpacker
        run: ls -al FiddPacker/build/libs

      - name: sha256-fiddpacker
        run: openssl sha256 FiddPacker/build/libs/*

      - name: ls-fiddview
        run: ls -al FiddView/build/libs

      - name: sha256-fiddview
        run: openssl sha256 FiddView/build/libs/*

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            Cryptor/build/libs/Cryptor-1.2.8-amd64-all.jar
            FiddPacker/build/libs/FiddPacker-1.2.8-amd64-all.jar

